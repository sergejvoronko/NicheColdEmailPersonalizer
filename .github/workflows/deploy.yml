name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - 'worker/**'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: cloudflare/wrangler-action@v3.14.0 # Using a specific patch version to avoid transient v3 tag issues
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'worker'
          # Force wrangler to use the latest version
          wranglerVersion: '3.109.2'
