<!DOCTYPE html>
<html>
<head>
  <title>Cold Email Personalizer</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { width: 300px; }
  </style>
</head>
<body class="p-4 bg-gray-100">
  <h1 class="text-xl font-bold mb-4 text-blue-600">Email Personalizer</h1>
  <button id="generateBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition duration-200">
    Generate Email
  </button>
  <div id="status" class="mt-4 text-sm text-gray-700 break-words"></div>
  
  <div id="resultContainer" class="hidden mt-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">Generated Email:</label>
    <textarea id="emailResult" class="w-full h-32 p-2 border rounded text-sm text-gray-800" readonly></textarea>
    <button id="copyBtn" class="mt-2 w-full bg-green-500 hover:bg-green-600 text-white font-bold py-1 px-4 rounded text-sm transition duration-200">
      Copy to Clipboard
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
